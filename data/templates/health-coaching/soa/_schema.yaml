version: "0.1.0"
description: 健康指導テンプレ SoA スキーマ
event_types:
  - id: session
    label: セッション記録
    fields:
      facts:
        - { key: session_date, type: date, required: true }
        - { key: duration_min, type: integer, required: true }
        - { key: pain_nrs_pre, type: integer, range: [0, 10] }
        - { key: pain_nrs_post, type: integer, range: [0, 10] }
        - { key: rpe, type: integer, range: [6, 20] }
      inputs:
        - { key: session_notes, type: text }
        - { key: client_subjective, type: text, label: クライアント主観コメント }
      refs:
        - { key: program_id, type: string }
  - id: measurement
    label: 測定
    fields:
      facts:
        - { key: measured_date, type: date, required: true }
        - { key: bp_systolic, type: integer }
        - { key: bp_diastolic, type: integer }
        - { key: weight_kg, type: number }
        - { key: rom_data, type: object, description: 関節別可動域 }
      inputs:
        - { key: notes, type: text }
  - id: intake
    label: 問診
    fields:
      facts:
        - { key: medical_history, type: array }
        - { key: current_medications, type: array }
        - { key: chief_complaint, type: text }
      inputs:
        - { key: goals, type: text }
        - { key: lifestyle_constraints, type: text }
append_only: true
