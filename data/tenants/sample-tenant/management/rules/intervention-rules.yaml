version: "0.1.0"
description: 介入判定ルール（テーブル駆動）
rules:
  - rule_id: critical_to_referral
    trigger: any
    conditions:
      - { field: facts.bp_systolic, op: ">=", value: 160 }
      - { field: facts.pain_nrs, op: ">=", value: 7 }
    output:
      risk_level: critical
      action: medical_referral
      rationale: 重度のリスク所見が検出されたため、医療連携を優先
  - rule_id: high_with_caution
    trigger: any
    conditions:
      - { field: facts.bp_systolic, op: ">=", value: 140, op2: "<", value2: 160 }
      - { field: facts.pain_nrs, op: ">=", value: 4, op2: "<", value2: 7 }
    output:
      risk_level: high
      action: conditional_program_with_medical_consult
      rationale: 中等度所見のため、注意観察下で漸進的に介入
  - rule_id: moderate_default
    trigger: any
    conditions:
      - { field: facts.bp_systolic, op: ">=", value: 130, op2: "<", value2: 140 }
    output:
      risk_level: moderate
      action: monitored_program
      rationale: 軽度所見のため、通常プログラム＋モニタリング強化
  - rule_id: low_default
    trigger: default
    output:
      risk_level: low
      action: standard_program
      rationale: 重大所見なし。標準プログラムで開始
