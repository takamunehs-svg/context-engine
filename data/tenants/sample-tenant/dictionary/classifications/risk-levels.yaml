key: risk_levels
description: AI導入・現場展開のリスク階層分類
levels:
  - id: low
    label: 展開可能
    description: 合意・運用・現場準備がそろい、小さな展開単位で進められる
    next_action: rollout_enablement_plan
  - id: watch
    label: 論点整理
    description: 重大な詰まりはないが、次回までに決める論点を絞る必要がある
    next_action: standard_followup_plan
  - id: medium
    label: 合意形成優先
    description: 担当者だけでは進みにくく、意思決定者向けの整理が必要
    next_action: executive_alignment_plan
  - id: high
    label: ガバナンス優先
    description: 展開前に責任分界・運用ルール・判断基準を固める必要がある
    next_action: governance_first_plan
