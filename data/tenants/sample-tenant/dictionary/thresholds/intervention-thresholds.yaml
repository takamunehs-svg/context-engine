key: intervention_thresholds
description: 介入判定の閾値
thresholds:
  - id: bp_systolic_high
    field: bp_systolic
    op: ">="
    value: 160
    action: medical_referral
    rationale: 重度高血圧域。運動負荷リスクが高い
  - id: bp_systolic_moderate
    field: bp_systolic
    op: ">="
    value: 140
    action: caution_required
    rationale: 高血圧域。負荷漸増が望ましい
  - id: pain_nrs_high
    field: pain_nrs
    op: ">="
    value: 7
    action: medical_referral
    rationale: 強い疼痛。医療評価が先
  - id: pain_nrs_moderate
    field: pain_nrs
    op: ">="
    value: 4
    action: pain_management_priority
    rationale: 中等度疼痛。介入は疼痛管理優先
  - id: rpe_overload
    field: rpe
    op: ">="
    value: 17
    action: load_reduction
    rationale: 主観的負荷が過剰
